<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detailing Bros | Paint Protection Specialists</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --black: #0d0800;
      --dark: #130e05;
      --gold: #D4A843;
      --gold-light: #E8C470;
      --gold-bright: #FFD700;
      --brown: #6B3F1A;
      --brown-light: #8B5A2B;
      --white: #FDF6E3;
      --grey: #9A8060;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--black);
      color:var(--white);
      font-family:'DM Sans',sans-serif;
      overflow-x:hidden;
      cursor:none;
      background-image:
        radial-gradient(ellipse at 0% 0%,rgba(107,63,26,0.18) 0%,transparent 50%),
        radial-gradient(ellipse at 100% 100%,rgba(212,168,67,0.08) 0%,transparent 50%);
    }
    @media(max-width:768px){
      body{cursor:auto;}
      a,button{cursor:pointer!important;}
      .cursor,.cursor-ring{display:none!important;}
    }

    /* Cursor */
    .cursor{position:fixed;width:10px;height:10px;background:#FFD700;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 12px #D4A843,0 0 28px rgba(212,168,67,0.5);}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(212,168,67,0.65);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.15s ease;}

    /* Navbar */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(13,8,0,0.96);backdrop-filter:blur(24px);border-bottom:1px solid rgba(212,168,67,0.3);box-shadow:0 4px 40px rgba(0,0,0,0.7);transition:padding 0.3s;}
    .nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.08em;color:#E8C470;}
    .nav-link{font-family:'DM Sans',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey);transition:color 0.3s;cursor:none;position:relative;text-decoration:none;white-space:nowrap;}
    .nav-link:hover{color:#FFD700;}
    .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:linear-gradient(to right,#D4A843,#FFD700);transition:width 0.3s;}
    .nav-link:hover::after{width:100%;}

    /* Dropdown */
    .dropdown-parent{position:relative;}
    .dropdown-menu{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%);background:rgba(13,8,0,0.99);backdrop-filter:blur(20px);border:1px solid rgba(212,168,67,0.3);border-top:2px solid #D4A843;min-width:260px;padding:12px 0;opacity:0;visibility:hidden;transition:all 0.25s ease;box-shadow:0 20px 60px rgba(0,0,0,0.9);z-index:100;}
    .dropdown-parent:hover .dropdown-menu{opacity:1;visibility:visible;top:calc(100% + 8px);}
    .dropdown-item{display:block;padding:10px 24px;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);transition:all 0.2s;text-decoration:none;white-space:nowrap;border-left:2px solid transparent;}
    .dropdown-item:hover{color:#FFD700;padding-left:32px;background:linear-gradient(to right,rgba(212,168,67,0.1),transparent);border-left-color:#D4A843;}

    /* Mobile menu */
    .mobile-menu{display:none;position:fixed;inset:0;background:rgba(8,4,0,0.99);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:0 32px;}
    .mobile-menu.open{display:flex;}
    .mobile-nav-link{font-family:'DM Sans',sans-serif;font-size:0.84rem;letter-spacing:0.2em;text-transform:uppercase;color:#9A8060;text-decoration:none;padding:5px 0;transition:color 0.2s;}
    .mobile-nav-link:hover{color:#FFD700;}

    /* Section divider */
    .section-divider{height:1px;background:linear-gradient(to right,transparent 0%,rgba(212,168,67,0.1) 20%,rgba(212,168,67,0.5) 50%,rgba(212,168,67,0.1) 80%,transparent 100%);}

    /* Gold tag */
    .gold-tag{display:inline-block;font-family:'DM Sans',sans-serif;font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:#D4A843;border:1px solid rgba(212,168,67,0.4);padding:6px 18px;background:rgba(212,168,67,0.05);}

    /* Buttons */
    .btn-primary{display:inline-block;font-family:'DM Sans',sans-serif;font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;padding:13px 30px;border:1px solid #D4A843;color:#FFD700;background:linear-gradient(135deg,rgba(212,168,67,0.1),rgba(107,63,26,0.15));transition:all 0.4s;position:relative;overflow:hidden;box-shadow:0 0 20px rgba(212,168,67,0.15);text-decoration:none;white-space:nowrap;}
    .btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#D4A843,#8B5A2B);transform:scaleX(0);transform-origin:right;transition:transform 0.4s ease;z-index:-1;}
    .btn-primary:hover{color:#0d0800;box-shadow:0 0 35px rgba(212,168,67,0.4);}
    .btn-primary:hover::before{transform:scaleX(1);transform-origin:left;}
    .btn-ghost{display:inline-block;font-family:'DM Sans',sans-serif;font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;padding:13px 30px;border:1px solid rgba(212,168,67,0.3);color:var(--grey);background:transparent;transition:all 0.4s;text-decoration:none;white-space:nowrap;}
    .btn-ghost:hover{border-color:#D4A843;color:#FFD700;box-shadow:0 0 20px rgba(212,168,67,0.15);}

    /* Hero scroll anim */
    .scroll-bar{width:1px;height:44px;background:linear-gradient(to bottom,#FFD700,transparent);animation:scrollDown 2.2s ease infinite;}
    @keyframes scrollDown{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}100%{transform:scaleY(0);transform-origin:bottom}}

    /* Hero ambient lines */
    .hero-line{position:absolute;top:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent 0%,#D4A843 30%,#FFD700 50%,#D4A843 70%,transparent 100%);opacity:0.3;pointer-events:none;}

    /* Fade up */
    .fade-up{opacity:0;transform:translateY(24px);transition:opacity 0.85s ease,transform 0.85s ease;}
    .fade-up.visible{opacity:1;transform:translateY(0);}
    .fd1{transition-delay:.08s}.fd2{transition-delay:.16s}.fd3{transition-delay:.24s}
    .fd4{transition-delay:.32s}.fd5{transition-delay:.4s}.fd6{transition-delay:.5s}

    /* Image mosaic cards */
    .img-card{overflow:hidden;border-radius:4px;position:relative;}
    .img-card img{width:100%;height:100%;object-fit:cover;filter:brightness(0.82) contrast(1.12) saturate(0.88);transition:transform 0.8s ease,filter 0.5s;display:block;}
    .img-card:hover img{transform:scale(1.05);filter:brightness(0.95) contrast(1.12) saturate(1.1);}
    .img-card::before{content:'';position:absolute;inset:0;border:1px solid rgba(212,168,67,0.22);border-radius:inherit;z-index:2;transition:border-color 0.3s;pointer-events:none;}
    .img-card:hover::before{border-color:rgba(255,215,0,0.45);}
    .img-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(107,63,26,0.12),rgba(212,168,67,0.02));z-index:1;pointer-events:none;}

    /* About */
    .video-wrapper{position:relative;overflow:hidden;aspect-ratio:16/9;}
    .video-wrapper iframe{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1.2);width:100%;height:100%;border:none;pointer-events:none;}
.why-item{display:flex;gap:20px;padding:24px 0;border-bottom:1px solid rgba(212,168,67,0.12);transition:padding 0.3s;}
.why-item:hover{padding-left:12px;}
.why-num{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;color:rgba(255,255,255,0.9);line-height:1;min-width:56px;transition:color 0.3s,text-shadow 0.3s;text-shadow:0 0 10px rgba(255,255,255,0.9),0 0 25px rgba(255,255,255,0.7),0 0 50px rgba(255,255,255,0.4);}
.why-item:hover .why-num{color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,0.6),0 0 28px rgba(212,168,67,0.4),0 0 55px rgba(212,168,67,0.2);}
    /* Service card */
    .service-card{background:linear-gradient(145deg,#1a1208,#110c04);border:1px solid rgba(212,168,67,0.18);padding:32px 24px;transition:all 0.4s;position:relative;overflow:hidden;text-decoration:none;display:block;}
    .service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,#D4A843,transparent);opacity:0;transition:opacity 0.4s;}
    .service-card:hover{border-color:rgba(212,168,67,0.45);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.7),0 0 40px rgba(212,168,67,0.08);}
    .service-card:hover::before{opacity:1;}
    .service-icon{width:48px;height:48px;border:1px solid rgba(212,168,67,0.3);display:flex;align-items:center;justify-content:center;margin-bottom:20px;transition:all 0.3s;background:rgba(212,168,67,0.05);}
    .service-card:hover .service-icon{border-color:#D4A843;box-shadow:0 0 20px rgba(212,168,67,0.2);}

    /* Footer */
    footer{background:#080400;border-top:1px solid rgba(212,168,67,0.2);}
    .footer-link{color:var(--grey);font-size:0.72rem;letter-spacing:0.06em;text-decoration:none;transition:color 0.3s;display:block;margin-bottom:11px;}
    .footer-link:hover{color:#FFD700;}

    /* ─── Stat divider ─── */
    .stat-div{width:1px;height:34px;background:rgba(212,168,67,0.3);}
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const images = [
  "img 1.avif","img2.avif","img3.avif",
  "/mnt/user-data/uploads/1774640131538_image.png",
  "/mnt/user-data/uploads/1774640294697_image.png",
  "/mnt/user-data/uploads/1774640306924_image.png",
  "/mnt/user-data/uploads/1774640322482_image.png",
  "/mnt/user-data/uploads/1774640334167_image.png",
  "/mnt/user-data/uploads/1774640423447_image.png",
  "/mnt/user-data/uploads/1774640436110_image.png",
  "/mnt/user-data/uploads/1774640450030_image.png",
];
const logo = "logo.avif";

function useCursor(){
  useEffect(()=>{
    const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
    if(!cur||!ring)return;
    const move=e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},60);};
    window.addEventListener('mousemove',move);return()=>window.removeEventListener('mousemove',move);
  },[]);
}
function useFadeUp(){
  useEffect(()=>{
    const els=document.querySelectorAll('.fade-up');
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');}),{threshold:0.08});
    els.forEach(el=>obs.observe(el));return()=>obs.disconnect();
  });
}

/* ── Navbar ── */
function Navbar(){
  const [scrolled,setScrolled]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>40);window.addEventListener('scroll',fn);return()=>window.removeEventListener('scroll',fn);},[]);

  const svc=[
    {label:"PPF Paint Protection Film",href:"#services"},{label:"Interior PPF",href:"#services"},
    {label:"Car Glass Solar Film",href:"#services"},{label:"Ceramic Coating",href:"#services"},
    {label:"Interior & Exterior Detailing",href:"#services"},{label:"Undercoating",href:"#services"},
    {label:"Surface Protection PPF",href:"#services"},
  ];
  const kev=[
    {label:"Kevlar Sheet",href:"#kevlar"},{label:"Kevlar Armor",href:"#kevlar"},
    {label:"Kevlar Max",href:"#kevlar"},{label:"Become a Dealer",href:"#contact"},
  ];
  const links=[
    {label:"Home",href:"#home"},
    {label:"Services",href:"#services",dd:svc},
    {label:"Kevlar PPF",href:"#kevlar",dd:kev},
    {label:"Detailing Room",href:"#about"},
    {label:"Referral Program",href:"#referral"},
    {label:"Blog",href:"#blog"},
    {label:"Contact",href:"#contact"},
    {label:"Privacy Policy",href:"#privacy"},
  ];

  return(
    <>
      <nav className="navbar" style={{padding:scrolled?'10px 0':'14px 0'}}>
        <div style={{maxWidth:1400,margin:'0 auto',padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <a href="#home" style={{display:'flex',alignItems:'center',gap:12,textDecoration:'none'}}>
            <img src={logo} alt="Detailing Bros" style={{height:44,width:44,objectFit:'contain',borderRadius:'50%'}}/>
            <div>
              <div className="nav-logo-text">DETAILING BROS</div>
              <div style={{fontSize:'0.5rem',letterSpacing:'0.2em',color:'#9A8060',textTransform:'uppercase',marginTop:1}}>Paint Protection Specialists</div>
            </div>
          </a>
          <div id="desknav" style={{display:'flex',alignItems:'center',gap:24}}>
            {links.map(l=>l.dd?(
              <div key={l.label} className="dropdown-parent">
                <a href={l.href} className="nav-link" style={{display:'flex',alignItems:'center',gap:5}}>
                  {l.label}
                  <svg width="8" height="5" viewBox="0 0 8 5" fill="none" style={{opacity:0.5}}><path d="M1 1l3 3 3-3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </a>
                <div className="dropdown-menu">
                  {l.dd.map(it=><a key={it.label} href={it.href} className="dropdown-item">{it.label}</a>)}
                </div>
              </div>
            ):(
              <a key={l.label} href={l.href} className="nav-link">{l.label}</a>
            ))}
          </div>
          <button onClick={()=>setOpen(true)} id="hamburger"
            style={{background:'none',border:'none',cursor:'pointer',display:'none',flexDirection:'column',gap:5,padding:4}}>
            <div style={{width:24,height:1,background:'#D4A843'}}></div>
            <div style={{width:16,height:1,background:'#D4A843'}}></div>
            <div style={{width:20,height:1,background:'#D4A843'}}></div>
          </button>
        </div>
      </nav>
      <div className={`mobile-menu ${open?'open':''}`}>
        <button onClick={()=>setOpen(false)} style={{position:'absolute',top:24,right:32,background:'none',border:'none',color:'#D4A843',fontSize:'1.5rem',cursor:'pointer'}}>✕</button>
        <img src={logo} alt="" style={{height:48,width:48,borderRadius:'50%',marginBottom:8}}/>
        <div style={{fontFamily:'Cormorant Garamond,serif',color:'#E8C470',fontSize:'1rem',letterSpacing:'0.08em',marginBottom:24}}>DETAILING BROS</div>
        {links.map(l=><a key={l.label} href={l.href} className="mobile-nav-link" onClick={()=>setOpen(false)}>{l.label}</a>)}
        <a href="#contact" onClick={()=>setOpen(false)}
          style={{marginTop:10,fontFamily:'DM Sans,sans-serif',fontSize:'0.68rem',letterSpacing:'0.2em',textTransform:'uppercase',padding:'12px 32px',border:'1px solid #D4A843',color:'#FFD700',textDecoration:'none',background:'rgba(212,168,67,0.08)'}}>
          Book Consultation
        </a>
      </div>
    </>
  );
}

/* ── Hero ── */

/* ── About ── */

/* ── Gallery ── */
function Gallery(){
  const ref=useRef(null),paused=useRef(false),pos=useRef(0),raf=useRef(null);
  useEffect(()=>{
    const t=ref.current;if(!t)return;
    Array.from(t.children).forEach(c=>t.appendChild(c.cloneNode(true)));
    const go=()=>{
      if(!paused.current){pos.current+=0.5;const w=t.scrollWidth/2;if(pos.current>=w)pos.current=0;t.style.transform=`translateX(-${pos.current}px)`;}
      raf.current=requestAnimationFrame(go);
    };
    raf.current=requestAnimationFrame(go);return()=>cancelAnimationFrame(raf.current);
  },[]);
  return(
    <section style={{padding:'88px 0 108px',overflow:'hidden',background:'linear-gradient(180deg,#0d0800 0%,#1a0f03 50%,#0d0800 100%)',position:'relative'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:1,background:'linear-gradient(to right,transparent,#D4A843,transparent)',opacity:0.4}}></div>

          <span style={{fontSize:'0.63rem',letterSpacing:'0.35em',textTransform:'uppercase',color:'#D4A843'}}>Our Work</span>
        </div>
        <h2 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'clamp(1.4rem,3vw,2.8rem)',fontWeight:300}}>
          Crafted with <span style={{color:'#D4A843',fontStyle:'italic'}}>Precision</span>
        </h2>
        <span style={{fontSize:'0.6rem',letterSpacing:'0.3em',textTransform:'uppercase',color:'#9A8060'}}>Hover to Pause</span>
      </div>
      <div style={{overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,bottom:0,width:90,background:'linear-gradient(to right,#0d0800,transparent)',zIndex:2,pointerEvents:'none'}}></div>
        <div style={{position:'absolute',right:0,top:0,bottom:0,width:90,background:'linear-gradient(to left,#0d0800,transparent)',zIndex:2,pointerEvents:'none'}}></div>
        <div ref={ref} style={{display:'flex',gap:12,width:'max-content',willChange:'transform'}}
          onMouseEnter={()=>paused.current=true} onMouseLeave={()=>paused.current=false}>

                onMouseLeave={e=>{e.target.style.transform='scale(1)';e.target.style.filter='brightness(0.72) contrast(1.1) saturate(0.82)';}}/>
            </div>
          ))}
        </div>
      </div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:1,background:'linear-gradient(to right,transparent,#D4A843,transparent)',opacity:0.4}}></div>
    </section>
  );
